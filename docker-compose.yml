version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: verifa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: verifa
      POSTGRES_PASSWORD: verifa_dev_password
      POSTGRES_DB: verifa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifa"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Next.js Frontend + API ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: verifa_frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://verifa:verifa_dev_password@postgres:5432/verifa
      DATABASE_URL_UNPOOLED: postgresql://verifa:verifa_dev_password@postgres:5432/verifa
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_me_in_production_please}
      WORKER_URL: http://worker:8000
      WORKER_SECRET: ${WORKER_SECRET:-change_me_worker_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET:-}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - worker_results:/app/results:ro  # read-only prístup k vygenerovaným PDF

  # ─── Redis (Arq Broker) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: verifa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Browserless (Playwright Scraping) ────────────────────
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: verifa_browserless
    restart: unless-stopped
    shm_size: 1g
    ports:
      - "3010:3000"
    environment:
      - CONNECTION_TIMEOUT=300000
      - MAX_CONCURRENT_SESSIONS=3

  # ─── Python FastAPI Worker ────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: verifa-worker-image
    container_name: verifa_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://verifa:verifa_dev_password@postgres:5432/verifa
      APP_ENV: development
      RESULTS_DIR: /app/results
      TZ: Europe/Bratislava
      PLAYWRIGHT_HEADLESS: "false"
      PLAYWRIGHT_TIMEOUT: "60000"
      WORKER_SECRET: ${WORKER_SECRET:-change_me_worker_secret}
      REDIS_URL: redis://redis:6379/0
      CRE_USERNAME: ${CRE_USERNAME:-}
      CRE_PASSWORD: ${CRE_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - worker_results:/app/results  # Evidence Binder PDF súbory

  # ─── Arq Background Worker ────────────────────────────────
  arq_worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: verifa-worker-image
    container_name: verifa_arq_worker
    restart: unless-stopped
    command: arq src.worker_arq.WorkerSettings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://verifa:verifa_dev_password@postgres:5432/verifa
      APP_ENV: development
      RESULTS_DIR: /app/results
      TZ: Europe/Bratislava
      PLAYWRIGHT_HEADLESS: "false"
      PLAYWRIGHT_TIMEOUT: "60000"
      WORKER_SECRET: ${WORKER_SECRET:-change_me_worker_secret}
      REDIS_URL: redis://redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      CRE_USERNAME: ${CRE_USERNAME:-}
      CRE_PASSWORD: ${CRE_PASSWORD:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - worker_results:/app/results

  # ─── DB Backup (cron pg_dump at 3am) ──────────────────────
  db-backup:
    image: postgres:16-alpine
    container_name: verifa_db_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: verifa
      DB_NAME: verifa
      BACKUP_DIR: /backups
      RETENTION_DAYS: "30"
      S3_BUCKET: ${S3_BACKUP_BUCKET:-}
      PGPASSWORD: verifa_dev_password
      TZ: Europe/Bratislava
    volumes:
      - db_backups:/backups
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 3 * * * /backup-db.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root &&
        crond -f -l 2

volumes:
  postgres_data:
  worker_results:
  db_backups:
