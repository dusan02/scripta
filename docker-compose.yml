version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: scripta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scripta
      POSTGRES_PASSWORD: scripta_dev_password
      POSTGRES_DB: scripta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scripta"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Next.js Frontend + API ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scripta_frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scripta:scripta_dev_password@postgres:5432/scripta
      DATABASE_URL_UNPOOLED: postgresql://scripta:scripta_dev_password@postgres:5432/scripta
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_me_in_production_please}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      WORKER_URL: http://worker:8000
      WORKER_SECRET: ${WORKER_SECRET:-change_me_worker_secret}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src         # hot reload v dev režime
      - worker_results:/app/results:ro  # read-only prístup k vygenerovaným PDF

  # ─── Python FastAPI Worker ────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: scripta_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scripta:scripta_dev_password@postgres:5432/scripta
      APP_ENV: development
      RESULTS_DIR: /app/results
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_TIMEOUT: "60000"
      WORKER_SECRET: ${WORKER_SECRET:-change_me_worker_secret}
      CRE_USERNAME: ${CRE_USERNAME:-}
      CRE_PASSWORD: ${CRE_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - worker_results:/app/results  # Evidence Binder PDF súbory

volumes:
  postgres_data:
  worker_results:
