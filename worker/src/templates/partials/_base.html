<!DOCTYPE html>
<html lang="{{ report_language|default('sk') }}">
<head>
    <meta charset="UTF-8">
    <script src="file://{{ tailwind_dir }}/tailwind.js"></script>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('file://{{ font_dir }}/Inter-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('file://{{ font_dir }}/Inter-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'DejaVu Sans';
            src: url('file://{{ font_dir }}/DejaVuSans.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'DejaVu Sans';
            src: url('file://{{ font_dir }}/DejaVuSans-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
    </style>
    <style type="text/tailwindcss">
        @page {
            margin: 18mm 18mm 22mm 18mm;
            @top-left {
                content: "Verifa Report | {{ company.name | default('') }}";
                font-family: 'Inter', sans-serif;
                font-size: 8px;
                color: #94a3b8;
                font-weight: 600;
            }
            @top-right {
                content: "{{ i18n.ico_label }}: {{ company.ico | default('') }}";
                font-family: 'Inter', sans-serif;
                font-size: 8px;
                color: #94a3b8;
                font-weight: 600;
            }
            @bottom-center {
                content: "Verifa Report | {{ company.name | default('') }} | {{ i18n.page_label }} " counter(page) " / " counter(pages);
                font-family: 'Inter', sans-serif;
                font-size: 8px;
                color: #94a3b8;
            }
        }
        @page:first {
            margin: 0;
            @top-left { content: ""; }
            @top-right { content: ""; }
            @bottom-center { content: ""; }
            @bottom-left { content: ""; }
        }
        body { 
            font-family: 'Inter', 'DejaVu Sans', -apple-system, 'Segoe UI', Roboto, 'Liberation Sans', sans-serif; 
            background-color: #ffffff; 
            color: #0f172a; 
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .page-break { page-break-before: always; }
        .page-break-after { page-break-after: always; }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 72px;
            font-weight: 900;
            color: #f1f5f9;
            letter-spacing: 0.3em;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }
        
        /* Table styling for sources */
        .source-table th {
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            font-weight: 700;
            border-bottom: 2px solid #10b981;
            text-align: left;
        }
        .source-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
            font-size: 12px;
        }
        .category-row td {
            background-color: #eff6ff;
            font-weight: 700;
            color: #0f172a;
            font-size: 14px;
            border-left: 4px solid #10b981;
            padding-top: 12px;
            padding-bottom: 12px;
        }
        .section-title {
            @apply text-base font-bold text-slate-700 mb-4 border-b-2 border-slate-200 pb-2;
            border-left: 4px solid #10b981;
            padding-left: 10px;
        }
        .part-divider {
            text-align: center;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #10b981;
            border-top: 2px solid #10b981;
            border-bottom: 1px solid #e2e8f0;
            padding: 6px 0 5px;
            margin-bottom: 10px;
            page-break-before: always;
            page-break-after: avoid;
        }
        .info-pill {
            @apply flex items-center gap-3 px-3 py-1.5 rounded-md w-48 shadow-sm border;
        }

        /* ── Unified typographic system for PDF report ── */
        /* Subsection titles (h3) — analytical sections */
        .subsection-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        /* Subsection titles (h3) — compact data sections (financials) */
        .subsection-title-sm {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }
        /* Body text — analytical/prose sections */
        .report-body {
            font-size: 12px;
            color: #1e293b;
            line-height: 1.6;
        }
        /* Body text — compact data sections */
        .report-body-sm {
            font-size: 10px;
            color: #1e293b;
            line-height: 1.5;
        }
        /* Captions, footnotes, disclaimers */
        .report-caption {
            font-size: 9px;
            color: #64748b;
            line-height: 1.45;
        }
        /* Micro labels for stat cards */
        .report-label {
            font-size: 8px;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="mx-auto relative" style="width: 174mm;">
    {% block content %}{% endblock %}

</body>
</html>
